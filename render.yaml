services:
  # Django Backend
  - type: web
    name: quiz-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn quiz_portal.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.2" # Adjust as needed

  # React Frontend (Static Site)
  - type: static
    name: quiz-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: we/vite-project
    envVars:
      - key: VITE_API_URL
        fromService:
          name: quiz-backend
          type: web
          property: url
        # Added /api suffix via frontend logic or environment override
      - key: VITE_SUPABASE_URL
        value: https://schmjafbheslmcrzsrmi.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: sb_publishable_JCiHXz2_zJHrA-3LRI8psA_p7Jd3TAL

databases:
  - name: quiz-db
    databaseName: quizportal
    user: quizuser
    plan: free
