services:
  # Django Backend
  - type: web
    name: quiz-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn quiz_portal.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.2"

databases:
  - name: quiz-db
    databaseName: quizportal
    user: quizuser
    plan: free
